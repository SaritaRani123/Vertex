<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up – Programs Scheduling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <!-- Left: Hello Friend -->
      <div class="auth-panel-purple">
        <h2>Hello, Friend!</h2>
        <p>Enter your personal details and start your journey with us</p>
      </div>
      <!-- Right: Sign up form -->
      <div class="auth-panel-white">
        <h2>Create Account</h2>
        <p class="subtitle">or use your email for registration</p>
        <form class="auth-form" action="/sign-in.html" method="get">
          <div class="field">
            <input type="text" name="name" placeholder="Name" />
          </div>
          <div class="field">
            <input type="email" name="email" placeholder="Email" required />
          </div>
          <div class="field">
            <input type="password" name="password" placeholder="Password" required minlength="6" />
          </div>
          <button type="submit" class="btn">SIGN UP</button>
          <p class="link-row">
            Already have an account? <a href="/sign-in.html">Sign in</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
