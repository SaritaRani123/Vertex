<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up – Programs Scheduling</title>
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-banner">
          <div class="auth-brand">
            <span class="brand-icon" aria-hidden>
              <!-- Graduation cap icon -->
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 3l10 5-10 5L2 8l10-5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <path d="M6 10v5c0 2 3 4 6 4s6-2 6-4v-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M22 8v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <span>
              Programs Scheduling
              <small>Create your account</small>
            </span>
          </div>
        </div>

        <div class="auth-content">
          <div class="auth-header">
            <h1>Sign up</h1>
            <p>Create an account to access scheduling tools.</p>
          </div>

          <form id="signUpForm" class="auth-form" novalidate>
            <div class="field">
              <label for="name">Full name</label>
              <div class="control">
                <!-- User icon -->
                <svg viewBox="0 0 24 24" fill="none" aria-hidden>
                  <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                </svg>
                <input id="name" type="text" name="name" placeholder="Your name" autocomplete="name" />
              </div>
            </div>

            <div class="field">
              <label for="email">Email</label>
              <div class="control">
                <!-- Mail icon -->
                <svg viewBox="0 0 24 24" fill="none" aria-hidden>
                  <path d="M4 6h16v12H4V6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                  <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input id="email" type="email" name="email" placeholder="name@college.edu" autocomplete="email" required />
              </div>
            </div>

            <div class="field">
              <label for="password">Password</label>
              <div class="control">
                <!-- Lock icon -->
                <svg viewBox="0 0 24 24" fill="none" aria-hidden>
                  <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M6 11h12v10H6V11z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                </svg>
                <input id="password" type="password" name="password" placeholder="At least 6 characters" autocomplete="new-password" required minlength="6" />
              </div>
            </div>


            <p id="signUpMessage" class="form-message hidden" role="alert"></p>

            <button id="signUpButton" type="submit" class="btn">
              <!-- Plus icon -->
              <svg viewBox="0 0 24 24" fill="none" aria-hidden>
                <path d="M12 5v14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              Create account
            </button>

            <div class="auth-divider"><span>or continue with</span></div>
            <a class="oauth-btn oauth-google" href="/api/auth/oauth/google?returnTo=/dashboard">
              <svg viewBox="0 0 24 24" aria-hidden>
                <path fill="#FFC107" d="M21.64 12.2c0-.64-.06-1.25-.16-1.84H12v3.48h5.4a4.62 4.62 0 0 1-2 3.03v2.52h3.24c1.9-1.75 3-4.34 3-7.2z"/>
                <path fill="#FF3D00" d="M12 22c2.7 0 4.96-.9 6.6-2.45l-3.24-2.52c-.9.6-2.05.96-3.36.96-2.58 0-4.76-1.74-5.54-4.08H3.1v2.6A10 10 0 0 0 12 22z"/>
                <path fill="#4CAF50" d="M6.46 13.91A6 6 0 0 1 6.14 12c0-.66.12-1.3.32-1.91V7.49H3.1A10 10 0 0 0 2 12c0 1.62.39 3.16 1.1 4.51l3.36-2.6z"/>
                <path fill="#1976D2" d="M12 5.98c1.47 0 2.79.5 3.83 1.48l2.87-2.87A9.95 9.95 0 0 0 12 2a10 10 0 0 0-8.9 5.49l3.36 2.6C7.24 7.72 9.42 5.98 12 5.98z"/>
              </svg>
              Continue with Google
            </a>
            <a class="oauth-btn oauth-github" href="/api/auth/oauth/github?returnTo=/dashboard">
              <svg viewBox="0 0 24 24" aria-hidden>
                <path fill="currentColor" d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.04c-3.34.73-4.04-1.42-4.04-1.42-.55-1.38-1.33-1.74-1.33-1.74-1.09-.75.08-.74.08-.74 1.2.09 1.84 1.24 1.84 1.24 1.08 1.85 2.83 1.31 3.52 1 .11-.78.42-1.31.77-1.61-2.67-.3-5.47-1.34-5.47-5.95 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.45 11.45 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.25 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.62-2.8 5.65-5.48 5.95.43.38.82 1.1.82 2.22v3.29c0 .32.22.69.83.58A12 12 0 0 0 12 .5z"/>
              </svg>
              Continue with GitHub
            </a>

            <p class="link-row">
              Already have an account? <a href="/sign-in.html">Sign in</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const form = document.getElementById("signUpForm");
      const button = document.getElementById("signUpButton");
      const message = document.getElementById("signUpMessage");

      const nameInput = document.getElementById("name");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");

      function showMessage(text, type) {
        message.textContent = text;
        message.classList.remove("hidden", "error", "success");
        message.classList.add(type);
      }

      function resetMessage() {
        message.textContent = "";
        message.classList.add("hidden");
        message.classList.remove("error", "success");
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        resetMessage();

        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!name || !email || !password) {
          showMessage("Name, email, and password are required.", "error");
          return;
        }
        if (password.length < 6) {
          showMessage("Password must be at least 6 characters.", "error");
          return;
        }

        button.disabled = true;
        button.textContent = "Creating account...";
        try {
          const response = await fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password }),
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            showMessage(data.error || "Sign up failed.", "error");
            return;
          }

          showMessage("Account created successfully. Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "/dashboard";
          }, 600);
        } catch {
          showMessage("Network error. Please try again.", "error");
        } finally {
          button.disabled = false;
          button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" aria-hidden><path d="M12 5v14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Create account';
        }
      });
    })();
  </script>
</body>
</html>
